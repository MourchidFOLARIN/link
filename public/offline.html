<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>ExellenceLink hors ligne</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Outfit, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #050911;
            color: #f1f5f9;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.14), transparent 34%),
                radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.14), transparent 34%),
                #050911;
        }

        main {
            width: min(100%, 440px);
            text-align: center;
        }

        img {
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
            line-height: 1.15;
        }

        p {
            margin: 0;
            color: #94a3b8;
            line-height: 1.6;
        }

        button {
            margin-top: 28px;
            border: 0;
            border-radius: 12px;
            padding: 12px 18px;
            background: #6366f1;
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <img src="/logo.svg" alt="">
        <h1>Mode hors ligne</h1>
        <p>ExellenceLink est installé, mais cette page n’est pas encore disponible sans connexion.</p>
        <button type="button" onclick="window.location.reload()">Réessayer</button>
    </main>
</body>
</html>
